<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Get a Quote | Groundworks</title>

  <style>
    /* ========================================
       FONTS
    ======================================== */
    @font-face {
      font-family: 'GroundworksDisplay';
      src: url('./fonts/HitandRun-Regular.otf') format('opentype');
    }

    @font-face {
      font-family: 'GroundworksWide';
      src: url('./fonts/PlacardNextWideRg.ttf') format('truetype');
    }

    /* ========================================
       BRAND VARIABLES
    ======================================== */
    :root {
      --bg: #1f1f1f;
      --card: #2a2a2a;
      --text: #ffffff;
      --text-soft: rgba(255,255,255,0.8);
      --accent: #f5d694;
      --border: rgba(255,255,255,0.12);
      --radius: 22px;
      --max-width: 760px;
    }

    /* ========================================
       RESET
    ======================================== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.5;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* ========================================
       LAYOUT
    ======================================== */
    .container {
      width: min(100% - 2rem, var(--max-width));
      margin: 0 auto;
    }

    .page {
      padding: 4rem 0;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 2rem;
      color: var(--text-soft);
    }

    .title {
      font-family: 'GroundworksDisplay', Impact, sans-serif;
      font-size: clamp(2.5rem, 8vw, 5rem);
      text-transform: uppercase;
      line-height: 0.9;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    .copy {
      color: var(--text-soft);
      margin-bottom: 2rem;
      max-width: 60ch;
    }

    /* ========================================
       FORM CARD
    ======================================== */
    .form-card {
      background: linear-gradient(
        180deg,
        rgba(255,255,255,0.04),
        rgba(255,255,255,0.02)
      );

      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      margin-bottom: 0.6rem;

      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;

      color: var(--accent);
    }

    input,
    textarea {
      width: 100%;

      background: #151515;
      color: white;

      border: 1px solid var(--border);
      border-radius: 14px;

      padding: 0.95rem 1rem;

      font: inherit;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    /* ========================================
       SERVICE BUTTONS
    ======================================== */
    .service-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
    }

    .service-option {
      position: relative;
    }

    /* Hide default checkbox */
    .service-option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .service-option span {
      display: flex;
      align-items: center;
      justify-content: center;

      min-height: 60px;

      background: #151515;

      border: 1px solid var(--border);
      border-radius: 14px;

      text-align: center;

      transition: 0.2s ease;
      cursor: pointer;
    }

    .service-option input:checked + span {
      background: rgba(245, 214, 148, 0.12);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ========================================
       BUTTON
    ======================================== */
    .submit-btn {
      width: 100%;

      min-height: 54px;

      border: none;
      border-radius: 999px;

      background: var(--accent);
      color: #111111;

      font-weight: 700;
      font-size: 1rem;

      cursor: pointer;
    }

    /* ========================================
       MOBILE
    ======================================== */
    @media (max-width: 600px) {
      .service-grid {
        grid-template-columns: 1fr;
      }
    }

    /* ========================================
    PHONE / EMAIL TWO COLUMN ROW
    ======================================== */
    .contact-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    /* Stack on mobile */
    @media (max-width: 600px) {
    .contact-row {
      grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="container">

      <!-- Back link -->
      <a class="back-link" href="index.html">
        ← Back to Home
      </a>

      <!-- Page heading -->
      <h1 class="title">Get a Quote</h1>

      <p class="copy">
        Send over the job details and Groundworks will reach back out.
      </p>

      <!--
        Replace YOUR_FORM_ID with Formspree ID
      -->
      <form
        class="form-card"
        action="https://formspree.io/f/YOUR_FORM_ID"
        method="POST"
      >

        <!-- ========================================
             SERVICES
        ======================================== -->
        <div class="form-group">
          <label>Select Service</label>

          <div class="service-grid">

            <label class="service-option">
              <input type="checkbox" name="service[]" value="Lawn Care">
              <span>Lawn Care</span>
            </label>

            <label class="service-option">
              <input type="checkbox" name="service[]" value="Clean Up">
              <span>Clean Up</span>
            </label>

            <label class="service-option">
              <input type="checkbox" name="service[]" value="Tree Trimming">
              <span>Tree Trimming</span>
            </label>

            <label class="service-option">
              <input type="checkbox" name="service[]" value="Restoration">
              <span>Restoration</span>
            </label>

            <label class="service-option">
              <input type="checkbox" name="service[]" value="Other">
              <span>Other</span>
            </label>

          </div>
        </div>

        <!-- ========================================
     NAME
======================================== -->
<div class="form-group">
  <label for="name">
    Your Name (What should we call you?)
  </label>

  <input
    id="name"
    name="name"
    type="text"
    placeholder="Your name"
    required
  />
</div>

<!-- ========================================
     CONTACT ROW
======================================== -->
<div class="contact-row">

  <!-- Phone -->
  <div class="form-group">
    <label for="phone">
      Phone
    </label>

    <input
      id="phone"
      name="phone"
      type="tel"
      placeholder="Phone number"
    />
  </div>

      <!-- Email -->
      <div class="form-group">
        <label for="email">
        Email
        </label>

        <input
        id="email"
        name="email"
        type="email"
        placeholder="Email address"
        />
      </div>

    </div>

        <!-- ========================================
             OPTIONAL MESSAGE
        ======================================== -->
        <div class="form-group">
          <label for="message">
            Message (Optional)
          </label>

          <textarea
            id="message"
            name="message"
            placeholder="Tell Groundworks about the property or project..."
          ></textarea>
        </div>

        <!-- ========================================
             SUBMIT
        ======================================== -->
        <button class="submit-btn" type="submit">
          Submit Quote Request
        </button>

      </form>

    </div>
  </main>
</body>
</html>
